    async function saveThreadEdit(event, threadId) {
      event.preventDefault();
      if (!currentUser) { showLogin(); return; }

      const btn = event.target.querySelector('button[type="submit"]');
      const title = document.getElementById('editThreadTitle').value.trim();
      const content = document.getElementById('editThreadContent').value.trim();
      const communityId = document.getElementById('editThreadCommunity').value;
      const imageInput = document.getElementById('editThreadImage');
      const removeImage = document.getElementById('removeThreadImage')?.checked;

      btn.disabled = true;
      btn.textContent = 'Saving...';

      try {
        const threadRef = doc(db, 'threads', threadId);
        const threadSnap = await getDoc(threadRef);
        if (!threadSnap.exists()) throw new Error('Thread not found');

        const thread = threadSnap.data();
        if (!isCurrentUserOwner(thread.authorId)) {
          throw new Error('You can only edit your own thread');
        }

        let imageUrl = thread.imageUrl || null;
        if (removeImage) {
          imageUrl = null;
        }
        if (imageInput.files[0]) {
          btn.textContent = 'Uploading image...';
          imageUrl = await uploadImage(imageInput.files[0], 'threads');
        }

        let communityName = '';
        if (communityId) {
          const communityDoc = await getDoc(doc(db, 'communities', communityId));
          if (communityDoc.exists()) communityName = communityDoc.data().name;
        }

        const updateData = {
          title,
          content,
          updatedAt: serverTimestamp()
        };
        updateData.imageUrl = imageUrl ? imageUrl : deleteField();
        updateData.communityId = communityId || deleteField();
        updateData.communityName = communityId ? communityName : deleteField();

        await updateDoc(threadRef, updateData);
        showMessage('Thread updated!', 'success');
        showThread(threadId);
      } catch (error) {
        console.error('Error updating thread:', error);
        showMessage(error.message || 'Error updating thread', 'error');
        btn.disabled = false;
        btn.textContent = 'Save Changes';
      }
    }

        showMessage(error.message || 'Error deleting thread', 'error');
      }
    }

    async function toggleLike(type, id) {
      if (!currentUser) { showMessage('Please login to vote', 'error'); return; }
      try {
        const collectionName = type === 'thread' ? 'threads' : 'comments';
        const docRef = doc(db, collectionName, id);
        const docSnap = await getDoc(docRef);
        if (!docSnap.exists()) return;

        const data = docSnap.data();
        const likedBy = data.likedBy || [];
        const userIndex = likedBy.indexOf(currentUser.uid);
        let newLikes = data.likes || 0;
        let newLikedBy = [...likedBy];

        if (userIndex > -1) {
          newLikedBy.splice(userIndex, 1);
          newLikes = Math.max(0, newLikes - 1);
        } else {
          newLikedBy.push(currentUser.uid);
          newLikes += 1;
          // Notify author
          if (data.authorId && data.authorId !== currentUser.uid) {
            await addNotification(data.authorId, 'like', `${currentUser.email.split('@')[0]} upvoted your ${type}`, type === 'thread' ? id : null);
          }
        }

        await updateDoc(docRef, { likes: newLikes, likedBy: newLikedBy });
      } catch (error) {
        console.error('Error toggling like:', error);
        showMessage('Error updating vote', 'error');
      }
    }

    async function loadFollowingFeedItems(userIds) {
      const uniqueUserIds = [...new Set((userIds || []).filter(Boolean))];
      if (uniqueUserIds.length === 0) return [];

      const [threadSnapshots, commentSnapshots, userSnapshots] = await Promise.all([
        Promise.all(uniqueUserIds.map(uid => getDocs(query(collection(db, 'threads'), where('authorId', '==', uid))))),
        Promise.all(uniqueUserIds.map(uid => getDocs(query(collection(db, 'comments'), where('authorId', '==', uid))))),
        Promise.all(uniqueUserIds.map(uid => getDoc(doc(db, 'users', uid))))
      ]);

      const items = [];
      const commentThreadIds = new Set();

      threadSnapshots.forEach((snap) => {
        const docs = snap.docs
          .map((d) => ({ id: d.id, ...d.data() }))
          .sort((a, b) => timestampToMillis(b.updatedAt || b.timestamp) - timestampToMillis(a.updatedAt || a.timestamp))
          .slice(0, 6);

        docs.forEach((data) => {
          items.push({
            type: 'thread',
            id: data.id,
            userId: data.authorId,
            username: data.author,
            title: data.title,
            body: excerpt(data.content, 220),
            timestamp: data.updatedAt || data.timestamp,
            communityName: data.communityName || ''
          });
        });
      });

      const commentItems = [];
      commentSnapshots.forEach((snap) => {
        const docs = snap.docs
          .map((d) => ({ id: d.id, ...d.data() }))
          .sort((a, b) => timestampToMillis(b.updatedAt || b.timestamp) - timestampToMillis(a.updatedAt || a.timestamp))
          .slice(0, 6);

        docs.forEach((data) => {
          commentThreadIds.add(data.threadId);
          commentItems.push({
            type: 'comment',
            id: data.id,
            userId: data.authorId,
            username: data.author,
            body: excerpt(data.content, 220),
            timestamp: data.updatedAt || data.timestamp,
            threadId: data.threadId
          });
        });
      });

      const threadTitleMap = {};
      await Promise.all([...commentThreadIds].map(async (threadId) => {
        const threadSnap = await getDoc(doc(db, 'threads', threadId));
        if (threadSnap.exists()) threadTitleMap[threadId] = threadSnap.data().title || 'a thread';
      }));

      commentItems.forEach((item) => {
        item.title = threadTitleMap[item.threadId] || 'a thread';
        items.push(item);
      });

      userSnapshots.forEach((snap) => {
        if (!snap.exists()) return;
        const data = snap.data();
        if (!data.updatedAt) return;
        items.push({
          type: 'profile',
          id: snap.id,
          userId: snap.id,
          username: data.username || data.email?.split('@')[0] || 'member',
          title: data.headline || data.currentFocus || 'Updated profile',
          body: excerpt(data.statusNote || data.currentFocus || data.bio || data.lookingFor, 220),
          timestamp: data.updatedAt
        });
      });

      return items
        .sort((a, b) => timestampToMillis(b.timestamp) - timestampToMillis(a.timestamp))
        .slice(0, 40);
    }

    async function loadFollowerFeedPosts(userIds) {
      const uniqueUserIds = [...new Set((userIds || []).filter(Boolean))];

    function rankLocalResources(goalText) {
      const terms = (goalText || '')
        .toLowerCase()
        .split(/[^a-z0-9]+/)
        .filter(Boolean);

      return RESOURCE_LIBRARY
        .map((resource) => {
          const haystack = `${resource.title} ${resource.category} ${resource.description} ${(resource.tags || []).join(' ')}`.toLowerCase();
          let score = 0;
          terms.forEach((term) => {
            if (term.length > 2 && haystack.includes(term)) score += 2;
          });
          if (/help|guide|how|start|where/i.test(goalText) && resource.route === 'messages') score += 4;
          if (/goal|plan|habits|accountability|progress/i.test(goalText) && resource.route === 'growth') score += 4;
          if (/community|people|network|mentor|support/i.test(goalText) && resource.route === 'communities') score += 4;
          if (/profile|bio|identity|about me|clarity/i.test(goalText) && resource.route === 'profile') score += 4;
          return { ...resource, _score: score };
        })
        .sort((a, b) => b._score - a._score);
    }

    function openResource(resourceId) {
      const resource = getResourceById(resourceId);
      if (!resource) return;

      if (currentUser) {
        trackJourneyEvent('resource_opened', { resourceId, route: resource.route || 'unknown' });
      }

      if (resource.route === 'external') {
        window.open(resource.externalUrl, '_blank', 'noopener,noreferrer');
        return;
      }

      if (!currentUser && resource.route !== 'messages') {
        showLogin();
        return;
      }

      switch (resource.route) {
        case 'messages':
          openGuideConversation();
          break;
        case 'profile':
          showProfile(currentUser.uid);
          break;
        case 'profiles':
          showMembers();
          break;
        case 'growth':
          showGrowthPaths();
          break;
        case 'communities':
          showCommunities();
          break;
        case 'following':
          showFollowingFeed();
          break;
        case 'insights':
          showAnthropology();
          break;
        case 'newThread':
          showNewThread();
          break;
        default:
          showHome();
          break;
      }
    }

        const saved = isResourceSaved(resourceId);
        await updateDoc(meRef, {
          savedResources: saved ? arrayRemove(resourceId) : arrayUnion(resourceId)
        });

        currentProfile = {
          ...(currentProfile || { id: currentUser.uid }),
          savedResources: saved
            ? (currentProfile?.savedResources || []).filter((id) => id !== resourceId)
            : [...new Set([...(currentProfile?.savedResources || []), resourceId])]
        };

        await trackJourneyEvent(saved ? 'resource_unsaved' : 'resource_saved', { resourceId });
        showMessage(saved ? 'Resource removed from saved items' : 'Resource saved', 'success');
        if (currentView === 'resources') {
          showResources();
        }
      } catch (error) {
        console.error('Error saving resource:', error);
        showMessage('Error updating saved resources', 'error');
      }
    }

    async function submitFeedPost(event) {
      event.preventDefault();
      if (!currentUser) { showLogin(); return; }

      const btn = event.target.querySelector('button[type="submit"]');
      const content = document.getElementById('feedPostText').value.trim();
      btn.disabled = true;
      btn.textContent = 'Posting...';

      try {
        await addDoc(collection(db, 'feedPosts'), {
          content,
          author: currentUser.email.split('@')[0],
          authorId: currentUser.uid,
          timestamp: serverTimestamp()
        });
        await trackJourneyEvent('feed_post_created', { length: content.length });

        const mySnap = await getDoc(doc(db, 'users', currentUser.uid));
        const followers = mySnap.data()?.followers || [];
        await Promise.all(followers.map((uid) =>
          addNotification(uid, 'feedpost', `${currentUser.email.split('@')[0]} posted a new note to followers`, null)
        ));

        const mentionedUsers = await resolveMentionedUsers(content);
        await Promise.all(mentionedUsers
          .filter((user) => user.id !== currentUser.uid)
          .map((user) => addNotification(user.id, 'mention', `${currentUser.email.split('@')[0]} mentioned you in a follower post`, null)));

        document.getElementById('feedPostText').value = '';
        showMessage('Posted to your followers!', 'success');
        showFollowingFeed();
      } catch (error) {
        console.error('Error posting follower update:', error);
        showMessage('Error posting to follower feed', 'error');
        btn.disabled = false;
        btn.textContent = 'Post to Feed';
      }
    }

    async function deleteFeedPost(postId) {
      if (!currentUser) { showLogin(); return; }
      if (!confirm('Delete this follower post?')) return;

      try {
        const ref = doc(db, 'feedPosts', postId);
        const snap = await getDoc(ref);
        if (!snap.exists()) return;
        if (!isCurrentUserOwner(snap.data().authorId)) {
          showMessage('You can only delete your own follower posts', 'error');
          return;
        }
        await deleteDoc(ref);
        showMessage('Follower post deleted', 'success');
        showFollowingFeed();
      } catch (error) {
        console.error('Error deleting follower post:', error);
        showMessage('Error deleting follower post', 'error');
      }
    }

    async function analyzeInteraction(type, id) {
      if (!currentUser) { showLogin(); return; }

      const box = document.getElementById(`analysis-${type}-${id}`);
      if (!box) return;
      box.innerHTML = '<div class="analysis-box">Analyzing tone...</div>';

      try {
        let ref;
        let interactionType = type;
        if (type === 'comment') ref = doc(db, 'comments', id);
        else if (type === 'feedPost') ref = doc(db, 'feedPosts', id);
        else if (type === 'journeyResponse') ref = doc(db, 'journeyResponses', id);
        else { box.innerHTML = '<div class="analysis-box">Unknown content type.</div>'; return; }
        const snap = await getDoc(ref);
        if (!snap.exists()) throw new Error('Interaction not found');
        const data = snap.data();

        let contextTitle = '';
        if (type === 'comment' && data.threadId) {
          const threadSnap = await getDoc(doc(db, 'threads', data.threadId));
          if (threadSnap.exists()) contextTitle = threadSnap.data().title || '';
        }
        if (type === 'journeyResponse') {
          contextTitle = 'Life Journey response';
        }

        const analyze = httpsCallable(functions, 'analyzeInteractionTone');
        const result = await analyze({
          interactionType,
          content: data.content || '',
          contextTitle
        });
        const analysis = result.data || {};
        box.innerHTML = `
          <div class="analysis-box">
            <strong>${escapeHtml(analysis.label || 'Tone Snapshot')}</strong>
            <div style="margin-top:4px;">${escapeHtml(analysis.summary || '')}</div>
            ${(analysis.cues || []).length ? `<div class="dashboard-signal-list">${analysis.cues.map((cue) => `<span class="dashboard-signal">${escapeHtml(cue)}</span>`).join('')}</div>` : ''}
          </div>
        `;
      } catch (error) {
        console.error('Error analyzing interaction tone:', error);
        box.innerHTML = '<div class="analysis-box">Tone analysis unavailable right now.</div>';
      }
    }

    async function toggleFollow(targetUserId) {
      if (!currentUser) return;
      try {
        const fn = httpsCallable(functions, 'toggleFollow');
        const result = await fn({ targetUserId });
        const action = result.data?.action;
        // Update local profile state
        if (action === 'followed') {
          if (currentProfile) currentProfile.following = [...new Set([...(currentProfile.following || []), targetUserId])];
        } else {
          if (currentProfile) currentProfile.following = (currentProfile.following || []).filter(id => id !== targetUserId);
        }
        showProfile(targetUserId);
      } catch (error) {
        console.error('Error toggling follow:', error);
        showMessage('Error updating follow', 'error');
      }
    }

    async function toggleUserVisibility(targetUserId, mode) {
      if (!currentUser) return;
      const field = mode === 'block' ? 'blockedUsers' : 'mutedUsers';
      const existing = new Set((currentProfile?.[field] || []).filter(Boolean));
      const active = existing.has(targetUserId);

      try {
        await updateDoc(doc(db, 'users', currentUser.uid), {
          [field]: active ? arrayRemove(targetUserId) : arrayUnion(targetUserId)
        });

        currentProfile = {
          ...(currentProfile || { id: currentUser.uid }),
          [field]: active
            ? (currentProfile?.[field] || []).filter((id) => id !== targetUserId)
            : [...new Set([...(currentProfile?.[field] || []), targetUserId])]
        };

        showMessage(active ? `${mode} removed.` : `${mode === 'block' ? 'User blocked.' : 'User muted.'}`, 'success');
        if (currentView === 'profile') {
          showProfile(targetUserId);
        } else {
          showHome();
        }
      } catch (error) {
        console.error(`Error updating ${mode}:`, error);
        showMessage(`Error updating ${mode}`, 'error');
      }
    }

    async function recalcBadges(userId) {
      try {
        if (!currentUser || userId !== currentUser.uid) return;
        const userSnap = await getDoc(doc(db, 'users', userId));
        if (!userSnap.exists()) return;
        const userData = userSnap.data();

        const threadsSnap = await getDocs(query(collection(db, 'threads'), where('authorId', '==', userId)));
        const commentsSnap = await getDocs(query(collection(db, 'comments'), where('authorId', '==', userId)));
        const totalPosts = threadsSnap.size + commentsSnap.size;

        let totalLikesReceived = 0;
        threadsSnap.forEach(d => totalLikesReceived += (d.data().likes || 0));
        commentsSnap.forEach(d => totalLikesReceived += (d.data().likes || 0));

        const badges = [];
        if (totalPosts >= BADGE_DEFS.contributor.minPosts) badges.push('contributor');
        if (totalLikesReceived >= BADGE_DEFS.expert.minLikesReceived) badges.push('expert');
        if (threadsSnap.size >= BADGE_DEFS.starter.minThreads) badges.push('starter');
        if ((userData.followers || []).length >= BADGE_DEFS.friendly.minFollowers) badges.push('friendly');

        await updateDoc(doc(db, 'users', userId), { badges, reputation: totalLikesReceived });
      } catch (error) {
        console.error('Error recalculating badges:', error);
      }
    }

    async function giveVouch(toUserId, domain, strength, message) {
      if (!currentUser) { showMessage('Must be logged in to vouch', 'error'); return; }
      if (currentUser.uid === toUserId) { showMessage('Cannot vouch for yourself', 'error'); return; }
      try {
        // Check if user follows target
        const mySnap = await getDoc(doc(db, 'users', currentUser.uid));
        const following = (mySnap.data()?.following || []);
        if (!following.includes(toUserId)) {
          showMessage('You must follow someone to vouch for them', 'error');
          return;
        }

        const vouchRef = await addDoc(collection(db, 'trustVouches'), {
          fromUserId: currentUser.uid,
          fromUserName: currentUser.email.split('@')[0],
          toUserId: toUserId,
          toUserName: (await getDoc(doc(db, 'users', toUserId))).data()?.username || 'user',
          domain: domain.toLowerCase().trim(),
          strength: Math.min(5, Math.max(1, strength)),
          message: message.trim(),
          createdAt: serverTimestamp(),
          status: 'active'
        });

        // Notify recipient
        await addNotification(toUserId, 'trust', `${currentUser.email.split('@')[0]} vouched for you in "${domain}"`, null);

        showMessage('Vouch given!', 'success');
        closeVouchModal();
        showProfile(toUserId);
      } catch (error) {
        console.error('Error giving vouch:', error);
        showMessage('Error giving vouch', 'error');
      }
    }

        const vouches = [];

    async function searchByTrust(domain) {
      try {
        const snap = await getDocs(query(collection(db, 'trustVouches'), where('domain', '==', domain.toLowerCase().trim()), where('status', '==', 'active')));
        const results = {};
        snap.forEach(d => {
          const userId = d.data().toUserId;
          if (!results[userId]) results[userId] = { userId, userName: d.data().toUserName, vouchCount: 0, vouchers: [] };
          results[userId].vouchCount++;
          results[userId].vouchers.push(d.data().fromUserName);
        });
        return Object.values(results);
      } catch (error) {
        console.error('Error searching by trust:', error);
        return [];
      }
    }

    let activeConvId = null;

    async function showMessages() {
      if (!currentUser) { showLogin(); return; }
      currentView = 'messages';
      activeConvId = null;
      cleanupListeners();
      const appEl = document.getElementById('app');
      appEl.innerHTML = '<div class="loading">Loading messages...</div>';

      const convQuery = query(collection(db, 'conversations'), where('participants', 'array-contains', currentUser.uid), orderBy('lastMessageAt', 'desc'));

      messagesListener = onSnapshot(convQuery, (snapshot) => {
        const conversations = [];
        snapshot.forEach(d => conversations.push({ id: d.id, ...d.data() }));

        let convListHtml = '<h3>Conversations</h3>';
        if (conversations.length === 0) {
          convListHtml += '<div style="padding:15px;color:var(--gray);font-size:13px;">No conversations yet. Visit a member\'s profile to start one.</div>';
        }
        for (const conv of conversations) {
          const otherParticipantId = (conv.participants || []).find((id) => id !== currentUser.uid);
          if (otherParticipantId && otherParticipantId !== PLATFORM_GUIDE_USER_ID && isUserHidden(otherParticipantId)) {
            continue;
          }
          const otherName = conv.botType === 'platformGuide'
            ? PLATFORM_GUIDE_NAME
            : conv.botType === 'sparkBot'
            ? SPARK_BOT_NAME
            : (conv.participantNames ? conv.participantNames.find(n => n !== currentUser.email.split('@')[0]) || 'Unknown' : 'Unknown');
          const hasUnread = conv.unreadBy && conv.unreadBy.includes(currentUser.uid);
          convListHtml += `
            <div class="conv-item ${conv.id === activeConvId ? 'active' : ''}" onclick="window.openConversation('${conv.id}')">
              <div class="conv-name">${escapeHtml(otherName)} ${hasUnread ? '<span class="unread-dot"></span>' : ''}</div>
              <div class="conv-preview">${escapeHtml(conv.lastMessage || '')}</div>
              <div class="conv-time">${formatTime(conv.lastMessageAt)}</div>
            </div>
          `;
        }

        // Only update conversation list, not the whole layout, if chat is open
        const existingList = document.querySelector('.conversations-list');
        if (existingList && activeConvId) {
          existingList.innerHTML = convListHtml;
        } else {
          appEl.innerHTML = `
            <div class="messaging-layout">
              <div class="conversations-list">${convListHtml}</div>
              <div class="chat-area">
                <div class="chat-empty">Select a conversation</div>
              </div>
            </div>
          `;
        }

        // Auto-open a conversation if one was requested
        if (pendingConvOpen) {
          const convToOpen = pendingConvOpen;
          pendingConvOpen = null;
          openConversation(convToOpen);
        }
      });
    }

    let chatListener = null;

    async function openConversation(convId) {
      if (chatListener) chatListener();
      activeConvId = convId;

      // Mark as read
      const convRef = doc(db, 'conversations', convId);
      await updateDoc(convRef, { unreadBy: arrayRemove(currentUser.uid) });

      const chatArea = document.querySelector('.chat-area');
      if (!chatArea) return;

      const convSnap = await getDoc(convRef);
      if (!convSnap.exists()) { showMessage('Conversation not found', 'error'); return; }
      const convData = convSnap.data();
      const otherName = convData.botType === 'platformGuide'
        ? PLATFORM_GUIDE_NAME
        : convData.botType === 'sparkBot'
        ? SPARK_BOT_NAME
        : (convData.participantNames ? convData.participantNames.find(n => n !== currentUser.email.split('@')[0]) || 'Unknown' : 'Unknown');

      chatArea.innerHTML = `
        <div class="chat-header">${escapeHtml(otherName)}</div>
        <div class="chat-messages" id="chatMessages"><div class="loading">Loading...</div></div>
        <div class="chat-input">
          <input type="text" id="msgInput" placeholder="Type a message..." onkeydown="if(event.key==='Enter'){window.sendMessage('${convId}');event.preventDefault();}">
          <button onclick="window.sendMessage('${convId}')">Send</button>
        </div>
      `;

      // Highlight active conversation
      document.querySelectorAll('.conv-item').forEach(el => el.classList.remove('active'));
      document.querySelectorAll('.conv-item').forEach(el => {
        if (el.getAttribute('onclick')?.includes(convId)) el.classList.add('active');
      });

      const msgsQuery = query(collection(db, 'conversations', convId, 'messages'), orderBy('timestamp', 'asc'));
      chatListener = onSnapshot(msgsQuery, (snapshot) => {
        const messages = [];
        snapshot.forEach(d => messages.push({ id: d.id, ...d.data() }));

        const chatMsgs = document.getElementById('chatMessages');
        if (!chatMsgs) return;

        if (messages.length === 0) {
          chatMsgs.innerHTML = '<div class="chat-empty">No messages yet. Say hello!</div>';
          return;
        }

        let html = '';
        for (const msg of messages) {
          const isMine = msg.authorId === currentUser.uid;
          html += `
            <div class="chat-msg ${isMine ? 'mine' : ''}">
              <div class="msg-author">${isMine ? 'you' : escapeHtml(msg.author)}</div>
              <div class="msg-bubble">${renderTextWithMentions(msg.content || '')}</div>
              <div class="msg-time">${formatTime(msg.timestamp)}</div>
            </div>
          `;
        }
        chatMsgs.innerHTML = html;
        chatMsgs.scrollTop = chatMsgs.scrollHeight;
      });
    }

    async function sendMessage(convId) {
      const input = document.getElementById('msgInput');
      const text = input.value.trim();
      if (!text) return;
      input.value = '';

      try {
        const username = currentUser.email.split('@')[0];
        await addDoc(collection(db, 'conversations', convId, 'messages'), {
          content: text,
          author: username,
          authorId: currentUser.uid,
          timestamp: serverTimestamp()
        });

        const convSnap = await getDoc(doc(db, 'conversations', convId));
        if (!convSnap.exists()) return;
        const convData = convSnap.data();
        const otherId = convData.participants.find(p => p !== currentUser.uid);
        const isPlatformGuide = convData.botType === 'platformGuide' || otherId === PLATFORM_GUIDE_USER_ID;

        await updateDoc(doc(db, 'conversations', convId), {
          lastMessage: text,
          lastMessageAt: serverTimestamp(),
          unreadBy: isPlatformGuide ? arrayRemove(currentUser.uid) : arrayUnion(otherId)
        });

        // Notify the other user
        if (!isPlatformGuide) {
          await addNotification(otherId, 'message', `${username} sent you a message`, null);
        }
      } catch (error) {
        console.error('Error sending message:', error);
        showMessage('Error sending message', 'error');
      }
    }

      snap.forEach((d) => {

        if (data.botType === 'platformGuide' || (data.participants || []).includes(PLATFORM_GUIDE_USER_ID)) {

    async function createLocalPlatformGuideConversation() {
      const username = currentProfile?.username || currentUser.email.split('@')[0] || 'member';
      const welcomeMessage = `Hi ${username}, I am ${PLATFORM_GUIDE_NAME}. JourneyHub is built to help builders find better signal: the right resources, communities, people, and next steps. Tell me what you are trying to grow, and I will help you find the best place to start.`;

      const convRef = await addDoc(collection(db, 'conversations'), {
        participants: [currentUser.uid, PLATFORM_GUIDE_USER_ID],
        participantNames: [username, PLATFORM_GUIDE_NAME],
        lastMessage: welcomeMessage,
        lastMessageAt: serverTimestamp(),
        unreadBy: [currentUser.uid],
        botType: 'platformGuide',
        botUserId: PLATFORM_GUIDE_USER_ID,
        createdAt: serverTimestamp()
      });

      await addDoc(collection(db, 'conversations', convRef.id, 'messages'), {
        content: welcomeMessage,
        author: PLATFORM_GUIDE_NAME,
        authorId: PLATFORM_GUIDE_USER_ID,
        timestamp: serverTimestamp(),
        botType: 'platformGuide'
      });

      await addNotification(currentUser.uid, 'message', `${PLATFORM_GUIDE_NAME} sent you a welcome message`, null);
      return convRef.id;
    }

    async function ensurePlatformGuideConversation() {
      if (!currentUser) return null;
      const existingConversationId = await findPlatformGuideConversationId();
      if (existingConversationId) return existingConversationId;

      try {
        const fn = httpsCallable(functions, 'ensurePlatformGuideConversation');
        const result = await fn();
        const createdConversationId = result.data?.conversationId || null;
        if (createdConversationId) return createdConversationId;
      } catch (error) {
        console.error('Error ensuring platform guide conversation:', error);
      }

      const fallbackConversationId = await findPlatformGuideConversationId();
      if (fallbackConversationId) return fallbackConversationId;

      try {
        return await createLocalPlatformGuideConversation();
      } catch (fallbackError) {
        console.error('Error creating local platform guide conversation:', fallbackError);
        return null;
      }
    }

    let pendingConvOpen = null;

    async function startConversation(otherUserId, otherUsername) {
      if (!currentUser) return;
      // Check if conversation already exists
      const q = query(collection(db, 'conversations'), where('participants', 'array-contains', currentUser.uid));
      const snap = await getDocs(q);
      let existingConvId = null;
      snap.forEach(d => {
        if (d.data().participants.includes(otherUserId)) {
          existingConvId = d.id;
        }
      });

      if (existingConvId) {
        pendingConvOpen = existingConvId;
        await showMessages();
        return;
      }

      // Create new conversation
      const myUsername = currentUser.email.split('@')[0];
      const convRef = await addDoc(collection(db, 'conversations'), {
        participants: [currentUser.uid, otherUserId],
        participantNames: [myUsername, otherUsername],
        lastMessage: '',
        lastMessageAt: serverTimestamp(),
        unreadBy: []
      });

      pendingConvOpen = convRef.id;
      await showMessages();
    }

    async function toggleCommunityMembership(communityId) {
      if (!currentUser) return;
      try {

        if (!snap.exists()) return;

        const isMember = (snap.data().members || []).includes(currentUser.uid);
        if (isMember) {
          await updateDoc(ref, { members: arrayRemove(currentUser.uid) });

    function renderCategoryTag(category) {
      const labels = { skill: 'Skill', habit: 'Habit', project: 'Project', relationship: 'Relationship' };
      return `<span class="growth-category cat-${category || 'skill'}">${labels[category] || category || 'Skill'}</span>`;

    function renderStatusTag(status) {
      const labels = { active: 'Active', completed: 'Completed', paused: 'Paused', 'needs-help': 'Needs Help' };
      return `<span class="status-tag status-${status || 'active'}">${labels[status] || 'Active'}</span>`;
    }

    function calcProgress(milestones) {
      if (!milestones || milestones.length === 0) return 0;
      const done = milestones.filter(m => m.completed).length;
      return Math.round((done / milestones.length) * 100);
    }

      return html;

    async function loadPath(pathId) {
      currentView = 'pathDetail';
      cleanupListeners();
      const appEl = document.getElementById('app');
      appEl.innerHTML = '<div class="loading">Loading path...</div>';

      try {
        const pathSnap = await getDoc(doc(db, 'growthPaths', pathId));
        if (!pathSnap.exists()) {
          appEl.innerHTML = '<div class="message error">Path not found.</div>';
          return;
        }
        const path = { id: pathSnap.id, ...pathSnap.data() };
        const progress = calcProgress(path.milestones);
        const isOwner = currentUser && currentUser.uid === path.ownerId;

        // Load participants
        const membersSnap = await getDocs(collection(db, 'growthPaths', pathId, 'members'));
        const members = [];
        membersSnap.forEach(d => members.push({ id: d.id, ...d.data() }));
        const currentMember = members.find(m => m.id === currentUser?.uid);
        const isMember = !!currentMember;

        // Load updates

    async function createGrowthPath(event) {
      event.preventDefault();
      const btn = event.target.querySelector('button[type="submit"]');
      btn.disabled = true;
      btn.textContent = 'Creating...';

      try {
        const title = document.getElementById('pathTitle').value.trim();
        const category = document.getElementById('pathCategory').value;
        const description = document.getElementById('pathDesc').value.trim();
        const visibility = document.getElementById('pathVisibility').value;
        const milestonesRaw = document.getElementById('pathMilestones').value.trim();
        const imageInput = document.getElementById('pathImage');

        let coverImage = '';
        if (imageInput.files[0]) {
          btn.textContent = 'Uploading image...';
          coverImage = await uploadImage(imageInput.files[0], 'growth');
        }

        const milestones = milestonesRaw.split('\n').filter(Boolean).map((line, i) => ({
          id: 'ms_' + i + '_' + Date.now(),
          title: line.trim(),
          completed: false,
          targetDate: ''
        }));

        const pathRef = await addDoc(collection(db, 'growthPaths'), {
          ownerId: currentUser.uid,
          ownerName: currentUser.email.split('@')[0],
          title, description, category, visibility, coverImage,
          milestones,
          status: 'active',
          memberCount: 1,
          createdAt: serverTimestamp(),
          updatedAt: serverTimestamp()
        });

        // Add owner as member
        await setDoc(doc(db, 'growthPaths', pathRef.id, 'members', currentUser.uid), {
          role: 'owner',
          userName: currentUser.email.split('@')[0],
          joinedAt: serverTimestamp(),
          active: true
        });

        // Update user's joinedPaths
        await setDoc(doc(db, 'users', currentUser.uid), {
          joinedPaths: arrayUnion(pathRef.id)
        }, { merge: true });

        loadPath(pathRef.id);
        showMessage('Growth path created!', 'success');
      } catch (error) {
        console.error('Error creating growth path:', error);
        showMessage('Error creating growth path', 'error');
        btn.disabled = false;
        btn.textContent = 'Create Path';
      }
    }

    async function joinGrowthPath(pathId, role) {
      if (!currentUser) return;
      try {
        await setDoc(doc(db, 'growthPaths', pathId, 'members', currentUser.uid), {
          role,
          userName: currentUser.email.split('@')[0],
          joinedAt: serverTimestamp(),
          active: true
        });
        await trackJourneyEvent('growth_path_joined', { pathId, role });

        // Increment member count
        const pathSnap = await getDoc(doc(db, 'growthPaths', pathId));
        if (pathSnap.exists()) {
          await updateDoc(doc(db, 'growthPaths', pathId), {
            memberCount: (pathSnap.data().memberCount || 1) + 1,
            updatedAt: serverTimestamp()
          });

          // Notify owner
          if (pathSnap.data().ownerId !== currentUser.uid) {
            await addNotification(pathSnap.data().ownerId, 'growth', `${currentUser.email.split('@')[0]} joined your path "${pathSnap.data().title}" as ${role}`, null);
          }
        }

        // Update user's joinedPaths
        await setDoc(doc(db, 'users', currentUser.uid), {
          joinedPaths: arrayUnion(pathId)
        }, { merge: true });

        loadPath(pathId);
        showMessage(`Joined as ${role}!`, 'success');
      } catch (error) {
        console.error('Error joining path:', error);
        showMessage('Error joining path', 'error');
      }
    }

    async function leaveGrowthPath(pathId) {
      if (!currentUser) return;
      try {
        await deleteDoc(doc(db, 'growthPaths', pathId, 'members', currentUser.uid));

        const pathSnap = await getDoc(doc(db, 'growthPaths', pathId));
        if (pathSnap.exists()) {
          await updateDoc(doc(db, 'growthPaths', pathId), {
            memberCount: Math.max(1, (pathSnap.data().memberCount || 1) - 1),
            updatedAt: serverTimestamp()
          });
        }

        await setDoc(doc(db, 'users', currentUser.uid), {
          joinedPaths: arrayRemove(pathId)
        }, { merge: true });

        loadPath(pathId);
        showMessage('Left the path.', 'success');
      } catch (error) {
        console.error('Error leaving path:', error);
        showMessage('Error leaving path', 'error');
      }
    }

    async function addPathUpdate(pathId) {
      const textEl = document.getElementById('pathUpdateText');
      const typeEl = document.getElementById('pathUpdateType');
      const text = textEl.value.trim();
      const type = typeEl.value;
      if (!text) return;

      try {
        await addDoc(collection(db, 'growthPaths', pathId, 'updates'), {
          userId: currentUser.uid,
          userName: currentUser.email.split('@')[0],
          text, type,
          createdAt: serverTimestamp()
        });

        // Notify other members
        const membersSnap = await getDocs(collection(db, 'growthPaths', pathId, 'members'));
        membersSnap.forEach(async (d) => {
          if (d.id !== currentUser.uid) {
            const pathSnap = await getDoc(doc(db, 'growthPaths', pathId));
            const pathTitle = pathSnap.exists() ? pathSnap.data().title : 'a path';
            await addNotification(d.id, 'growth', `${currentUser.email.split('@')[0]} posted a ${type} on "${pathTitle}"`, null);
          }
        });

        textEl.value = '';
        loadPath(pathId);
        showMessage('Update posted!', 'success');
      } catch (error) {
        console.error('Error posting update:', error);
        showMessage('Error posting update', 'error');
      }
    }

    async function completeMilestone(pathId, milestoneId) {
      try {
        const pathSnap = await getDoc(doc(db, 'growthPaths', pathId));
        if (!pathSnap.exists()) return;
        const pathData = pathSnap.data();

        const milestones = (pathData.milestones || []).map(m => {
          if (m.id === milestoneId) {
            return { ...m, completed: !m.completed };
          }
          return m;
        });

        // Auto-complete path if all milestones done
        const allDone = milestones.length > 0 && milestones.every(m => m.completed);
        const updateData = { milestones, updatedAt: serverTimestamp() };
        if (allDone) updateData.status = 'completed';

        await updateDoc(doc(db, 'growthPaths', pathId), updateData);

        // Notify members on milestone completion
        const toggled = milestones.find(m => m.id === milestoneId);
        if (toggled && toggled.completed) {
          const membersSnap = await getDocs(collection(db, 'growthPaths', pathId, 'members'));
          membersSnap.forEach(async (d) => {
            if (d.id !== currentUser.uid) {
              await addNotification(d.id, 'growth', `${currentUser.email.split('@')[0]} completed milestone "${toggled.title}" on "${pathData.title}"`, null);
            }
          });
        }

        loadPath(pathId);
      } catch (error) {
        console.error('Error toggling milestone:', error);
        showMessage('Error updating milestone', 'error');
      }
    }

    async function handleNotifClick(notifId, type, linkId) {
      // Mark as read
      await updateDoc(doc(db, 'notifications', notifId), { read: true });

      if (linkId && (type === 'comment' || type === 'like' || type === 'mention')) {
        showThread(linkId);
      } else if (type === 'message') {
        showMessages();
      } else if (type === 'feedpost') {
        showFollowingFeed();
      } else if (type === 'journey') {
        showProfile(currentUser.uid);
      } else {
        showNotifications();
      }
    }

    async function markAllRead() {
      if (!currentUser) return;
      try {
        const snap = await getDocs(query(collection(db, 'notifications'), where('userId', '==', currentUser.uid), where('read', '==', false)));
        const promises = [];
        snap.forEach(d => promises.push(updateDoc(doc(db, 'notifications', d.id), { read: true })));
        await Promise.all(promises);
        showNotifications();
        showMessage('All notifications marked as read', 'success');
      } catch (error) {
        console.error('Error marking notifications read:', error);
      }
    }

        const topicKeywords = prompt('What topic do you want to understand? (e.g., "productivity management" or "remote work")');

          topicKeywords: topicKeywords.split(' '),

        });
        
        const data = result.data;
        // Normalize — fields could be strings, arrays, or missing

          if (!val) return [];
          if (Array.isArray(val)) return val;
          if (typeof val === 'string') return [val];
          return [];
        };
        const consensus = toArray(data.consensus);
        const contradictions = toArray(data.contradictions);
        const conditions = toArray(data.conditions);
        const evolution = toArray(data.evolution);

        appEl.innerHTML = `
          <div class="insight-view">

    async function saveIdea(event, existingId) {
      event.preventDefault();
      const btn = event.target.querySelector('button[type="submit"]');
      btn.disabled = true;
      btn.textContent = 'Saving...';

      try {
        const title = document.getElementById('ideaTitle').value.trim();
        const draft = document.getElementById('ideaDraft').value.trim();
        const tags = document.getElementById('ideaTags').value.split(',').map(s => s.trim()).filter(Boolean);

        // Calculate readiness score
        let readiness = 0;
        if (title.length > 5) readiness += 20;
        if (draft.length > 50) readiness += 20;
        if (draft.length > 200) readiness += 20;
        if (tags.length > 0) readiness += 20;
        if (draft.split('\n').length > 3) readiness += 20;

        const data = {
          userId: currentUser.uid,
          userName: currentUser.email.split('@')[0],
          title, draft, tags,
          publicationReadiness: readiness,
          updatedAt: serverTimestamp()
        };

        if (existingId) {
          await updateDoc(doc(db, 'thoughtLab', existingId), data);
        } else {
          data.status = 'draft';
          data.createdAt = serverTimestamp();
          await addDoc(collection(db, 'thoughtLab'), data);
        }

        await updateStreak();
        await incrementChallengeProgress('thread');
        showThoughtLab();
        showMessage('Idea saved!', 'success');
      } catch (error) {
        console.error('Error saving idea:', error);
        showMessage('Error saving idea', 'error');
        btn.disabled = false;
        btn.textContent = 'Save Draft';
      }
    }

    async function showCoThinkDetail(sessionId) {
      currentView = 'coThinkDetail';
      cleanupListeners();
      const appEl = document.getElementById('app');
      appEl.innerHTML = '<div class="loading">Loading session...</div>';

      // Set up the static shell first, then use onSnapshot to stream responses
      const sessionRef = doc(db, 'coThinkSessions', sessionId);

      coThinkListener = onSnapshot(sessionRef, (snap) => {
        if (!snap.exists()) {
          appEl.innerHTML = '<div class="message error">Session not found.</div>';
          return;
        }
        const session = { id: snap.id, ...snap.data() };

        const now = Date.now();
        const closeTime = session.closeAt?.toDate ? session.closeAt.toDate().getTime() : (session.closeAt instanceof Date ? session.closeAt.getTime() : new Date(session.closeAt).getTime());
        const openTime = session.openAt?.toDate ? session.openAt.toDate().getTime() : 0;
        const isLive = now >= openTime && now <= closeTime;
        const isPast = now > closeTime;
        const hasResponded = currentUser && (session.responses || []).some(r => r.authorId === currentUser.uid);

        let responsesHtml = '';
        for (const r of (session.responses || [])) {
          responsesHtml += `
            <div class="session-response">
              <div class="resp-author"><span style="cursor:pointer;" onclick="window.showProfile('${r.authorId}')">${escapeHtml(r.author)}</span></div>
              <div>${escapeHtml(r.content)}</div>
            </div>
          `;
        }

        appEl.innerHTML = `
          <a href="#" class="back-link" onclick="window.showCoThinkList(); return false;">&#8592; back to sessions</a>
          <div class="profile-card">
            <h1 style="font-size:20px;">${escapeHtml(session.question)}</h1>
            <div id="coThinkTimerDisplay"></div>
            <div style="font-size:12px;color:var(--gray);font-family:'IBM Plex Mono',monospace;">
              <span class="participant-count">${isLive ? '<span class="live-dot"></span> LIVE' : ''} ${(session.participants || []).length} participants</span>
              | ${(session.responses || []).length} responses
              | hosted by ${escapeHtml(session.hostName || 'unknown')}
            </div>

            ${session.aiSummary ? `
              <div class="ai-synthesis">
                <strong>AI Synthesis:</strong><br>
                ${escapeHtml(session.aiSummary)}
              </div>
            ` : ''}

            ${isLive && currentUser && !hasResponded ? `
              <div class="new-thread-form" style="margin:15px 0;padding:12px;background:var(--bg);">
                <form onsubmit="window.submitCoThinkResponse('${sessionId}', event); return false;">
                  <div class="form-group">
                    <textarea id="coThinkResponse" placeholder="Share your thoughts (keep it concise)..." required style="min-height:60px;"></textarea>
                  </div>
                  <button type="submit" class="small-btn" style="background:#1565c0;">Submit Response</button>
                </form>
              </div>
            ` : ''}
            ${isLive && hasResponded ? '<div class="message success" style="margin:10px 0;">You\'ve submitted your response. New responses will appear automatically.</div>' : ''}
            ${isPast && !session.aiSummary && session.hostId === currentUser?.uid && (session.responses || []).length >= 2 ? `<button class="small-btn" style="background:#1565c0;margin:10px 0;" onclick="window.runCoThinkSynthesis('${sessionId}')">Generate AI Synthesis</button>` : ''}
          </div>

          <div style="margin-top:15px;">
            <h3 style="margin-bottom:10px;">Responses (${(session.responses || []).length})</h3>
            <div id="coThinkResponses">
              ${responsesHtml || '<div class="message info">No responses yet. Be the first!</div>'}
            </div>
          </div>
        `;

        // Start live countdown timer if session is active
        if (coThinkTimer) clearInterval(coThinkTimer);
        if (isLive) {
          const updateTimer = () => {
            const el = document.getElementById('coThinkTimerDisplay');
            if (!el) return;
            const remaining = Math.max(0, closeTime - Date.now());
            const mins = Math.floor(remaining / 60000);
            const secs = Math.floor((remaining % 60000) / 1000);
            if (remaining <= 0) {
              el.innerHTML = '<div style="font-size:13px;color:var(--gray);margin:8px 0;">Session ended</div>';
              clearInterval(coThinkTimer);
              coThinkTimer = null;
            } else {
              el.innerHTML = `<div class="session-timer"><span class="live-dot" style="display:inline-block;margin-right:6px;"></span> ${mins}:${secs.toString().padStart(2, '0')} remaining</div>`;
            }
          };
          updateTimer();
          coThinkTimer = setInterval(updateTimer, 1000);
        } else if (isPast) {
          const el = document.getElementById('coThinkTimerDisplay');
          if (el) el.innerHTML = '<div style="font-size:13px;color:var(--gray);margin:8px 0;">Session ended</div>';
        }
      }, (error) => {
        console.error('Error loading session:', error);
        appEl.innerHTML = '<div class="message error">Error loading session.</div>';
      });
    }

    async function submitCoThinkResponse(sessionId, event) {
      event.preventDefault();
      const text = document.getElementById('coThinkResponse').value.trim();
      if (!text) return;

      // Disable submit button immediately to prevent double-click
      const btn = event.target.querySelector('button[type="submit"]');
      if (btn) { btn.disabled = true; btn.textContent = 'Submitting...'; }

      try {
        const sessionRef = doc(db, 'coThinkSessions', sessionId);
        const snap = await getDoc(sessionRef);
        if (!snap.exists()) {
          showMessage('Session not found.', 'error');
          if (btn) { btn.disabled = false; btn.textContent = 'Submit Response'; }
          return;
        }

        const responses = snap.data().responses || [];

        // Block if user already responded
        if (responses.some(r => r.authorId === currentUser.uid)) {
          showMessage('You already submitted a response to this session.', 'info');
          if (btn) { btn.disabled = false; btn.textContent = 'Already submitted'; }
          return;
        }

        responses.push({
          authorId: currentUser.uid,
          author: currentUser.email.split('@')[0],
          content: text,
          timestamp: new Date().toISOString()
        });

        await updateDoc(sessionRef, {
          responses,
          participants: arrayUnion(currentUser.uid)
        });

        celebrate('reaction');
        await updateStreak();
        showMessage('Response submitted!', 'success');
      } catch (error) {
        console.error('Error submitting response:', error);
        showMessage('Error submitting response', 'error');
      }
    }

        const session = snap.data();

        const responsesText = (session.responses || []).map(r => `${r.author}: ${r.content}`).join('\n\n');

        const synthesize = httpsCallable(functions, 'summarizeThread');
        const result = await synthesize({
          title: session.question,
          content: 'This is a Co-Think brainstorm session. Synthesize the key themes, agreements, and unique insights from the responses below.',

    // ──────────────────────────────────────────
    // Pulse Radar
    // ──────────────────────────────────────────
    async function getRadarSignals() {
      if (!currentUser || !currentProfile) return [];
      const signals = [];

      try {
        const interests = [...(currentProfile.interests || []), ...(currentProfile.expertiseAreas || [])];
        const following = currentProfile.following || [];

        // Pending quest checkpoints
        const questSnap = await getDocs(query(collection(db, 'missions'), where('participants', 'array-contains', currentUser.uid), where('status', '==', 'active')));
        questSnap.forEach(d => {
          const q = d.data();
          const pending = (q.checkpoints || []).filter(c => !c.completed).length;
          if (pending > 0) {
            signals.push({ icon: '⚔️', text: `Quest "${(q.title || '').slice(0, 30)}": ${pending} checkpoints remaining`, action: `window.showQuestDetail('${d.id}')`, priority: 3 });
          }
        });

        // Mentor/followed user activity
        if (following.length > 0) {
          const fSlice = following.slice(0, 10);
          try {
            const fThreads = await getDocs(query(collection(db, 'threads'), where('authorId', 'in', fSlice), orderBy('timestamp', 'desc'), fsLimit(3)));
            fThreads.forEach(d => {
              const t = d.data();
              signals.push({ icon: '👤', text: `${t.author} posted: "${(t.title || '').slice(0, 40)}"`, action: `window.showThread('${d.id}')`, priority: 2 });
            });
          } catch (e) { /* in query limit */ }
        }

        // Live co-think sessions
        const coSnap = await getDocs(query(collection(db, 'coThinkSessions'), orderBy('openAt', 'desc'), fsLimit(5)));
        const now = Date.now();
        coSnap.forEach(d => {
          const s = d.data();
          const close = s.closeAt?.toDate ? s.closeAt.toDate().getTime() : (s.closeAt instanceof Date ? s.closeAt.getTime() : new Date(s.closeAt).getTime());
          const open = s.openAt?.toDate ? s.openAt.toDate().getTime() : 0;
          if (now >= open && now <= close) {
            signals.push({ icon: '🧠', text: `Co-Think LIVE: "${(s.question || '').slice(0, 40)}"`, action: `window.showCoThinkDetail('${d.id}')`, priority: 4 });
          }
        });

        // Draft ideas reminder
        const ideaSnap = await getDocs(query(collection(db, 'thoughtLab'), where('userId', '==', currentUser.uid), where('status', '==', 'draft'), fsLimit(3)));
        if (!ideaSnap.empty) {
          signals.push({ icon: '💡', text: `You have ${ideaSnap.size} draft idea${ideaSnap.size > 1 ? 's' : ''} in your Thought Lab`, action: `window.showThoughtLab()`, priority: 1 });
        }

        // Challenge progress
        const challenge = getCurrentChallenge();
        const userData = currentProfile;
        const cp = userData.challengeProgress || {};
        const currentWeek = Math.floor(Date.now() / (7 * 24 * 3600000));
        const progress = (cp.week === currentWeek) ? (cp.count || 0) : 0;
        if (progress < challenge.target) {
          signals.push({ icon: '🎯', text: `Weekly challenge: ${progress}/${challenge.target} — ${challenge.title}`, action: `window.showChallenge()`, priority: 2 });
        }
      } catch (error) {
        console.error('Error getting radar signals:', error);
      }

      return signals.sort((a, b) => b.priority - a.priority);
    }

    function renderRadarPanel(signals) {
      if (!signals || signals.length === 0) return '';
      let html = `<div class="radar-panel"><h3>📡 Pulse Radar</h3>`;
      for (const s of signals.slice(0, 6)) {
        html += `<div class="radar-item" onclick="${s.action}"><span class="radar-icon">${s.icon}</span> ${escapeHtml(s.text)}</div>`;
      }
      html += '</div>';
      return html;
    }

    // ──────────────────────────────────────────
    // Shareable Mood Card
    // ──────────────────────────────────────────
    function shareMoodCard(emoji, word, summary) {
      const canvas = document.createElement('canvas');
      canvas.width = 800;
      canvas.height = 420;
      const ctx = canvas.getContext('2d');

      // Background
      ctx.fillStyle = '#0a0e14';
      ctx.fillRect(0, 0, 800, 420);

      // Subtle grid
      ctx.strokeStyle = 'rgba(0,210,106,0.04)';
      ctx.lineWidth = 1;
      for (let x = 0; x < 800; x += 30) { ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, 420); ctx.stroke(); }
      for (let y = 0; y < 420; y += 30) { ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(800, y); ctx.stroke(); }

      // Glow
      const grd = ctx.createRadialGradient(400, 200, 0, 400, 200, 300);
      grd.addColorStop(0, 'rgba(0,210,106,0.08)');
      grd.addColorStop(1, 'rgba(0,210,106,0)');
      ctx.fillStyle = grd;
      ctx.fillRect(0, 0, 800, 420);

      // Border
      ctx.strokeStyle = 'rgba(0,210,106,0.2)';
      ctx.lineWidth = 2;
      ctx.strokeRect(12, 12, 776, 396);

      // Header
      ctx.font = '14px monospace';
      ctx.fillStyle = '#5c6773';
      ctx.textAlign = 'center';
      ctx.fillText('MOOD OF THE INTERNET', 400, 55);

      // Emoji + word
      ctx.font = 'bold 48px monospace';
      ctx.fillStyle = '#00d26a';
      ctx.fillText(`${emoji} ${word}`, 400, 130);

      // Summary — word wrap
      ctx.font = '16px monospace';
      ctx.fillStyle = '#c8d6e5';
      const words = summary.split(' ');
      let line = '';
      let y = 185;
      const maxWidth = 680;
      for (const w of words) {
        const test = line + w + ' ';
        if (ctx.measureText(test).width > maxWidth && line) {
          ctx.fillText(line.trim(), 400, y);
          line = w + ' ';
          y += 26;
        } else {
          line = test;
        }
      }
      if (line) ctx.fillText(line.trim(), 400, y);

      // Date
      const today = new Date().toLocaleDateString('en-US', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });
      ctx.font = '12px monospace';
      ctx.fillStyle = '#3d4f5f';
      ctx.fillText(today, 400, 350);

      // Branding
      ctx.font = 'bold 14px monospace';
      ctx.fillStyle = '#00d26a';
      ctx.fillText('JourneyHub', 400, 385);

      // Download or share
      canvas.toBlob(async (blob) => {
        if (navigator.share && navigator.canShare) {
          const file = new File([blob], 'mood-of-the-internet.png', { type: 'image/png' });
          try {
            await navigator.share({
              title: `Mood of the Internet: ${emoji} ${word}`,
              text: summary,
              files: [file]
            });
            return;
          } catch (e) { /* Fallback to download */ }
        }
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = 'mood-of-the-internet.png';
        a.click();
        URL.revokeObjectURL(url);
        showMessage('Mood card downloaded! Share it on social media.', 'success');
      }, 'image/png');
    }

    // ──────────────────────────────────────────
    // Trending Content
    // ──────────────────────────────────────────
    async function getTrendingThreads(allThreads) {
      // Score threads by recency + reaction count + comment velocity
      const now = Date.now();
      const oneWeek = 7 * 24 * 3600000;
      const scored = [];
      for (const t of allThreads) {
        const ts = t.timestamp?.toDate ? t.timestamp.toDate().getTime() : (t.timestamp ? new Date(t.timestamp).getTime() : 0);
        if (now - ts > oneWeek) continue; // Only last 7 days
        const age = Math.max(1, (now - ts) / 3600000); // hours
        const reactionCount = Object.values(t.reactions || {}).reduce((sum, arr) => sum + arr.length, 0);
        const commentCount = await getCommentCount(t.id);
        const score = ((t.likes || 0) + reactionCount * 2 + commentCount * 3) / Math.pow(age, 0.5);
        scored.push({ ...t, _trendScore: score, _commentCount: commentCount });
      }
      return scored.sort((a, b) => b._trendScore - a._trendScore).slice(0, 5);
    }

    async function checkMilestoneBadges(userId) {
      try {
        if (!currentUser || userId !== currentUser.uid) return;
        const userSnap = await getDoc(doc(db, 'users', userId));
        if (!userSnap.exists()) return;
        const data = userSnap.data();

        const threadsSnap = await getDocs(query(collection(db, 'threads'), where('authorId', '==', userId)));
        const commentsSnap = await getDocs(query(collection(db, 'comments'), where('authorId', '==', userId)));

        // Count helpful reactions received
        let helpfulReactions = 0;
        threadsSnap.forEach(d => {
          const r = d.data().reactions || {};
          helpfulReactions += (r.helpful || []).length;
        });
        commentsSnap.forEach(d => {
          const r = d.data().reactions || {};
          helpfulReactions += (r.helpful || []).length;
        });

        // Count reactions given (approximate from threads/comments user reacted to)
        let reactionsGiven = data.reactionsGiven || 0;

        const stats = {
          threads: threadsSnap.size,
          comments: commentsSnap.size,
          streak: data.streak || 0,
          followers: (data.followers || []).length,
          helpfulReactions,
          reactionsGiven,
          referrals: (data.referrals || []).length
        };

        const currentBadges = data.badges || [];
        const newBadges = [...currentBadges];
        let earned = false;

        for (const [key, def] of Object.entries(MILESTONE_BADGES)) {
          if (!newBadges.includes(key) && def.check(stats)) {
            newBadges.push(key);
            earned = true;
          }
        }

        if (earned) {
          await updateDoc(doc(db, 'users', userId), { badges: newBadges });
          celebrate('badge');
          showMessage('You earned a new badge!', 'success');
          await loadProfile(userId);
        }
      } catch (error) {
        console.error('Error checking milestone badges:', error);
      }
    }

      if (!currentUser) return;
      try {
        const challenge = getCurrentChallenge();
        if (challenge.action !== action) return;

        const currentWeek = Math.floor(Date.now() / (7 * 24 * 3600000));
        const userRef = doc(db, 'users', currentUser.uid);
        const snap = await getDoc(userRef);
        if (!snap.exists()) return;

        const data = snap.data();
        const cp = data.challengeProgress || {};
        let count = (cp.week === currentWeek) ? (cp.count || 0) : 0;
        count++;

        await updateDoc(userRef, {
          challengeProgress: { week: currentWeek, id: challenge.id, count }
        });

        if (count === challenge.target) {
          celebrate('badge');
          showMessage(`Challenge completed: ${challenge.title}!`, 'success');

        console.error('Error updating challenge progress:', error);

    async function getRecommendations() {
      if (!currentUser || !currentProfile) return [];
      const recs = [];
      const following = currentProfile.following || [];
      const interests = [...(currentProfile.interests || []), ...(currentProfile.expertiseAreas || [])].map(s => s.toLowerCase());

      try {
        // New members in your interest area
        const usersSnap = await getDocs(query(collection(db, 'users'), orderBy('joinDate', 'desc'), fsLimit(20)));
        usersSnap.forEach(d => {
          if (d.id === currentUser.uid) return;
          if (following.includes(d.id)) return;
          const u = d.data();
          const theirInterests = [...(u.interests || []), ...(u.expertiseAreas || [])].map(s => s.toLowerCase());
          const overlap = interests.filter(i => theirInterests.includes(i));
          if (overlap.length > 0) {
            recs.push({
              type: 'member',
              text: `${u.username} shares your interest in ${overlap[0]}`,
              action: `window.showProfile('${d.id}')`,
              priority: overlap.length
            });
          }
        });

        // Threads from people you follow (recent)
        if (following.length > 0) {
          const followSlice = following.slice(0, 10);
          const fThreadsSnap = await getDocs(query(collection(db, 'threads'), where('authorId', 'in', followSlice), orderBy('timestamp', 'desc'), fsLimit(5)));
          fThreadsSnap.forEach(d => {
            const t = d.data();
            recs.push({
              type: 'thread',
              text: `${t.author} posted: "${(t.title || '').slice(0, 50)}"`,
              action: `window.showThread('${d.id}')`,
              priority: 2
            });
          });
        }
      } catch (error) {
        console.error('Error getting recommendations:', error);
      }

      return recs.sort((a, b) => b.priority - a.priority).slice(0, 5);
    }

    async function updateStreak() {
      if (!currentUser) return;
      try {
        const userRef = doc(db, 'users', currentUser.uid);
        const snap = await getDoc(userRef);
        if (!snap.exists()) return;
        const data = snap.data();

        const today = new Date().toISOString().split('T')[0];
        const lastActive = data.lastActiveDate || '';
        const currentStreak = data.streak || 0;

        if (lastActive === today) return; // Already active today

        const yesterday = new Date(Date.now() - 86400000).toISOString().split('T')[0];
        let newStreak;
        if (lastActive === yesterday) {
          newStreak = currentStreak + 1;
        } else {
          newStreak = 1;
        }

        await updateDoc(userRef, {
          lastActiveDate: today,
          streak: newStreak
        });

        // Celebrate streak milestones
        if ([3, 7, 14, 30, 50, 100].includes(newStreak)) {
          celebrate('badge');
          showMessage(`${newStreak} day streak! Keep it going!`, 'success');
        }

        // Refresh profile
        await loadProfile(currentUser.uid);
        updateNav();
      } catch (error) {
        console.error('Error updating streak:', error);
      }
    }

    // ──────────────────────────────────────────
    // Hot Thread Detection
    // ──────────────────────────────────────────
    function isHotThread(thread, commentCount) {
      if (!thread.timestamp) return false;
      const age = Date.now() - (thread.timestamp.toDate ? thread.timestamp.toDate() : new Date(thread.timestamp)).getTime();
      const hoursSincePost = age / 3600000;
      if (hoursSincePost > 48) return false; // Only threads < 2 days old
      // Hot if: 5+ comments in <24h, or 3+ comments in <6h
      if (hoursSincePost < 6 && commentCount >= 3) return true;
      if (hoursSincePost < 24 && commentCount >= 5) return true;
      return false;
    }

    function updateMetaTag(name, content) {
      // Try property first (og:), then name

      if (el) {

    function escapeHtml(text) {
      if (!text) return '';
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    function escapeAttr(text) {
      if (!text) return '';
      return text.replace(/&/g, '&amp;').replace(/'/g, '&#39;').replace(/"/g, '&quot;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
    }

    function formatTime(timestamp) {
      if (!timestamp) return 'just now';
      const date = timestamp.toDate ? timestamp.toDate() : new Date(timestamp);
      const now = new Date();
      const diff = now - date;
      const minutes = Math.floor(diff / 60000);
      const hours = Math.floor(diff / 3600000);
      const days = Math.floor(diff / 86400000);
      if (minutes < 1) return 'just now';
      if (minutes < 60) return `${minutes}m ago`;
      if (hours < 24) return `${hours}h ago`;
      return `${days}d ago`;
    }

    function showMessage(text, type) {
      const appEl = document.getElementById('app');
      const message = document.createElement('div');
      message.className = `message ${type}`;
      message.textContent = text;
      appEl.insertBefore(message, appEl.firstChild);
      setTimeout(() => {
        message.style.opacity = '0';
        message.style.transition = 'opacity 0.3s';
        setTimeout(() => message.remove(), 300);
      }, 3000);
    }

    // Image upload
    const MAX_IMAGE_SIZE = 5 * 1024 * 1024;
    const ALLOWED_TYPES = ['image/jpeg', 'image/png', 'image/gif', 'image/webp'];

    function handleImageSelect(inputId, previewId) {
      const input = document.getElementById(inputId);
      const file = input.files[0];
      if (!file) return;
      if (!ALLOWED_TYPES.includes(file.type)) {
        showMessage('Only JPEG, PNG, GIF, and WebP images are allowed', 'error');
        input.value = '';
        return;
      }
      if (file.size > MAX_IMAGE_SIZE) {
        showMessage('Image must be under 5MB', 'error');
        input.value = '';
        return;
      }
      const reader = new FileReader();
      reader.onload = (e) => {
        document.getElementById(previewId).innerHTML = `
          <img src="${e.target.result}" alt="Preview">
          <button type="button" class="remove-image" onclick="window.removeImage('${inputId}', '${previewId}')">&times;</button>
        `;
      };
      reader.readAsDataURL(file);
    }

      document.getElementById(inputId).value = '';
      document.getElementById(previewId).innerHTML = '';
    }

    // Button ripple position tracking
    document.addEventListener('pointerdown', (e) => {
      const btn = e.target.closest('button');
      if (!btn) return;
      const rect = btn.getBoundingClientRect();
      btn.style.setProperty('--ripple-x', ((e.clientX - rect.left) / rect.width * 100) + '%');
      btn.style.setProperty('--ripple-y', ((e.clientY - rect.top) / rect.height * 100) + '%');
    });

    // Staggered entrance for list items
    const observer = new MutationObserver((mutations) => {
      for (const mutation of mutations) {
        if (mutation.type !== 'childList') continue;
        const container = mutation.target;
        const items = container.querySelectorAll('.thread-item, .community-card, .growth-card, .member-card, .event-card, .notif-item, .comment, .feed-item');
        items.forEach((el, i) => {
          if (el.dataset.animated) return;
          el.dataset.animated = '1';
          el.style.opacity = '0';
          el.style.transform = 'translateY(8px)';
          requestAnimationFrame(() => {
            el.style.transition = `opacity 0.3s ${i * 0.04}s, transform 0.3s ${i * 0.04}s cubic-bezier(0.4, 0, 0.2, 1)`;
            el.style.opacity = '1';
            el.style.transform = 'translateY(0)';
          });
        });
      }
    });
    observer.observe(document.getElementById('app'), { childList: true, subtree: true });

    // ──────────────────────────────────────────
    async function deleteAccount() {
      if (!currentUser) return;
      const confirm1 = confirm('Are you sure you want to delete your account? This cannot be undone.');
      if (!confirm1) return;
      const confirm2 = prompt('Type DELETE to confirm:');
      if (confirm2 !== 'DELETE') { showMessage('Account deletion cancelled.', 'info'); return; }

      try {
        showMessage('Deleting account data...', 'info');
        const uid = currentUser.uid;

        // Delete user's threads
        const threadsSnap = await getDocs(query(collection(db, 'threads'), where('authorId', '==', uid)));
        for (const d of threadsSnap.docs) await deleteDoc(doc(db, 'threads', d.id));

        // Delete user's comments
        const commentsSnap = await getDocs(query(collection(db, 'comments'), where('authorId', '==', uid)));
        for (const d of commentsSnap.docs) await deleteDoc(doc(db, 'comments', d.id));

        // Delete user's thought lab
        const ideasSnap = await getDocs(query(collection(db, 'thoughtLab'), where('userId', '==', uid)));
        for (const d of ideasSnap.docs) await deleteDoc(doc(db, 'thoughtLab', d.id));

        // Delete user's notifications
        const notifsSnap = await getDocs(query(collection(db, 'notifications'), where('userId', '==', uid)));
        for (const d of notifsSnap.docs) await deleteDoc(doc(db, 'notifications', d.id));

        // Delete user profile
        await deleteDoc(doc(db, 'users', uid));

        // Delete Firebase Auth account
        await deleteUser(currentUser);

        showMessage('Account deleted. Goodbye.', 'success');
        showHome();
      } catch (error) {
        console.error('Error deleting account:', error);
        if (error.code === 'auth/requires-recent-login') {
          showMessage('For security, please log out and log back in, then try again.', 'error');
        } else {
          showMessage('Error deleting account: ' + error.message, 'error');
        }
      }
    }

    // ──────────────────────────────────────────
    // 2. Content Moderation Dashboard
    // ──────────────────────────────────────────
    async function showModeration() {
      if (!currentUser) { showLogin(); return; }
      // Check admin status
      const userSnap = await getDoc(doc(db, 'users', currentUser.uid));
      if (!userSnap.exists() || !userSnap.data().isAdmin) {
        showMessage('Admin access required.', 'error');
        return;
      }

      currentView = 'moderation';
      cleanupListeners();
      const appEl = document.getElementById('app');
      appEl.innerHTML = '<div class="loading">Loading reports...</div>';

      try {
        const snap = await getDocs(query(collection(db, 'reports'), orderBy('timestamp', 'desc'), fsLimit(50)));
        const reports = [];
        snap.forEach(d => reports.push({ id: d.id, ...d.data() }));

        let html = '<h2 style="margin-bottom:15px;">Content Moderation</h2>';

        const pending = reports.filter(r => r.status === 'pending');
        const resolved = reports.filter(r => r.status !== 'pending');

        html += `<p style="font-size:13px;color:var(--gray);margin-bottom:15px;">${pending.length} pending report${pending.length !== 1 ? 's' : ''}</p>`;

        if (pending.length === 0) {
          html += '<div class="empty-state"><div class="empty-icon">&#9745;</div><h3>All clear</h3><p>No pending reports to review.</p></div>';
        }

        for (const r of pending) {
          // Try to load the flagged content
          let contentPreview = '';
          try {
            const collectionMap = {
              thread: 'threads',
              comment: 'comments',
              feedPost: 'feedPosts',
              journeyResponse: 'journeyResponses'
            };
            const coll = collectionMap[r.contentType];
            if (!coll) throw new Error('Unsupported content type');
            const contentSnap = await getDoc(doc(db, coll, r.contentId));
            if (contentSnap.exists()) {
              const data = contentSnap.data();
              contentPreview = data.title ? `<strong>${escapeHtml(data.title)}</strong>: ` : '';
              contentPreview += escapeHtml((data.content || '').slice(0, 200));
            } else {
              contentPreview = '<em>Content deleted</em>';
            }
          } catch (e) { contentPreview = '<em>Unable to load</em>'; }

          html += `
            <div class="report-card">
              <div class="report-meta">
                ${escapeHtml(r.contentType)} reported by ${escapeHtml(r.reporterName || 'unknown')} | ${formatTime(r.timestamp)}
              </div>
              <div style="font-size:13px;margin:4px 0;"><strong>Reason:</strong> ${escapeHtml(r.reason)}</div>
              <div class="report-content">${contentPreview}</div>
              <div class="inline-actions">
                <button class="small-btn danger-btn" onclick="window.modDeleteContent('${r.id}', '${r.contentType}', '${r.contentId}')">Delete Content</button>
                <button class="small-btn secondary-btn" onclick="window.modDismiss('${r.id}')">Dismiss</button>
              </div>
            </div>
          `;
        }

        if (resolved.length > 0) {
          html += `<h3 style="margin:20px 0 10px;">Resolved (${resolved.length})</h3>`;
          for (const r of resolved.slice(0, 10)) {
            html += `
              <div class="report-card" style="opacity:0.5;border-left-color:var(--border);">
                <div class="report-meta">${escapeHtml(r.contentType)} | ${escapeHtml(r.status)} | ${formatTime(r.timestamp)}</div>
              </div>
            `;
          }
        }

        appEl.innerHTML = html;
      } catch (error) {
        console.error('Error loading moderation:', error);
        appEl.innerHTML = '<div class="message error">Error loading moderation dashboard. Are you an admin?</div>';
      }
    }
