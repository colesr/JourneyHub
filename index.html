          <h2>4. Community Standards</h2>
          <p>Be respectful. No hate speech, harassment, doxxing, or intentionally harmful content. Violations may result in content removal or account suspension.</p>

          <h2>5. AI Features</h2>
          <p>JourneyHub uses AI (Google Gemini) for features like thread summarization, mood analysis, and comment improvement. AI-generated content is provided as-is and may not always be accurate.</p>

          <h2>6. Termination</h2>
          <p>You can delete your account at any time from your profile settings. We may suspend accounts that violate these terms.</p>

          <h2>7. Limitation of Liability</h2>
          <p>JourneyHub is provided "as is." We're not liable for any damages arising from your use of the platform.</p>

          <h2>8. Changes</h2>
          <p>We may update these terms. Continued use after changes means you accept the new terms.</p>

          <p style="margin-top:20px;"><a href="#" onclick="window.showHome(); return false;" class="back-link">&#8592; Back to JourneyHub</a></p>
        </div>
      `;
    }

    function showPrivacy() {
      currentView = 'privacy';
      cleanupListeners();
      document.getElementById('app').innerHTML = `
        <div class="legal-page">
          <h1>Privacy Policy</h1>
          <p><em>Last updated: March 2026</em></p>

          <h2>1. What We Collect</h2>
          <p>Email address (for authentication), profile information you provide (bio, interests, location), content you post (threads, comments, messages), and usage data (activity streaks, reactions).</p>

          <h2>2. How We Use It</h2>
          <p>To operate the platform, show your profile to other members, send notifications, generate recommendations, and improve the service. We use Google Gemini AI to power features like mood analysis and content summarization.</p>

          <h2>3. What We Share</h2>
          <p>Your public profile and posts are visible to other members. We do not sell your data. We use Firebase (Google) for hosting, authentication, and data storage.</p>

          <h2>4. Data Storage</h2>
          <p>Your data is stored on Google Firebase servers. Messages are only visible to conversation participants.</p>

          <h2>5. Your Rights</h2>
          <p>You can edit or delete your profile at any time. You can delete your entire account and all associated data from your profile settings. You can export your data by contacting us.</p>

          <h2>6. Cookies</h2>
          <p>We use localStorage to save your theme preference and Firebase uses cookies for authentication. No third-party tracking cookies.</p>

          <h2>7. Children</h2>
          <p>JourneyHub is not intended for users under 13. We do not knowingly collect data from children.</p>

          <h2>8. Contact</h2>
          <p>For privacy concerns, reach out through the platform's messaging system.</p>

          <p style="margin-top:20px;"><a href="#" onclick="window.showHome(); return false;" class="back-link">&#8592; Back to JourneyHub</a></p>
        </div>
      `;
    }

    // ──────────────────────────────────────────
    // 4. Error handling
    // ──────────────────────────────────────────
    window.addEventListener('error', (e) => {
      console.error('Global error:', e.error);
      const appEl = document.getElementById('app');
      if (appEl && (!appEl.innerHTML || appEl.innerHTML.includes('Loading'))) {
        appEl.innerHTML = `
          <div class="empty-state" style="margin-top:40px;">
            <div class="empty-icon">&#9888;</div>
            <h3>Something went wrong</h3>
            <p>An unexpected error occurred. Try refreshing the page.</p>
            <button onclick="window.showHome()">Go Home</button>
          </div>
        `;
      }
    });

    window.addEventListener('unhandledrejection', (e) => {
      console.error('Unhandled promise rejection:', e.reason);
    });

    function show404() {
      document.getElementById('app').innerHTML = `
        <div class="empty-state" style="margin-top:40px;">
          <div class="empty-icon">&#128269;</div>
          <h3>Page not found</h3>
          <p>The page you're looking for doesn't exist or has been moved.</p>
          <button onclick="window.showHome()">Go Home</button>
        </div>
      `;
    }

    // ──────────────────────────────────────────
    // 5. Email Verification
    // ──────────────────────────────────────────
    async function sendVerification() {
      if (!currentUser) return;
      try {
        await sendEmailVerification(currentUser, { url: window.location.origin });
        showMessage('Verification email sent! Check your inbox and spam folder.', 'success');
      } catch (error) {
        if (error.code === 'auth/too-many-requests') {
          showMessage('Verification email already sent. Check your inbox.', 'info');
        } else {
          showMessage('Error sending verification email.', 'error');
        }
      }
    }

    function renderVerificationBanner() {
      if (!currentUser || currentUser.emailVerified) return '';
      // Don't nag too hard — only show for first 7 days
      const joinDate = currentProfile?.joinDate?.toDate ? currentProfile.joinDate.toDate() : null;
      if (joinDate && (Date.now() - joinDate.getTime()) > 7 * 24 * 3600000) return '';
      return `
        <div class="verify-banner">
          <span>&#9888; Verify your email to secure your account.</span>
          <button onclick="window.sendVerification()">Send Email</button>
          <span style="font-size:10px;opacity:0.6;cursor:pointer;" onclick="this.parentElement.remove();">dismiss</span>
        </div>
      `;
    }

    // ──────────────────────────────────────────
    // 6. Onboarding Flow
    // ──────────────────────────────────────────
    async function getOnboardingStatus() {
      if (!currentUser || !currentProfile) return null;
      const p = currentProfile;

      // Check profile setup
      const profileSetup = !!(p.bio || p.location || (p.interests && p.interests.length > 0));

      // Check if user joined any community
      let joinedCommunity = false;
      try {
        const commSnap = await getDocs(collection(db, 'communities'));
        commSnap.forEach(d => {
          if ((d.data().members || []).includes(currentUser.uid)) joinedCommunity = true;
        });
      } catch (e) { /* ignore */ }

      // Check if user created any thread
      let firstPost = false;
      try {
        const threadsSnap = await getDocs(query(collection(db, 'threads'), where('authorId', '==', currentUser.uid), fsLimit(1)));
        firstPost = !threadsSnap.empty;
      } catch (e) { /* ignore */ }

      // Check reactions given
      const firstReaction = (p.reactionsGiven || 0) > 0;
      const directionSet = !!(p.onboardingSignalsSet || p.growthGoal || p.growthChallenge || p.preferredSupport || p.growthStage);

      return {
        directionSet,
        profileSetup,
        joinedCommunity,
        firstPost,
        firstReaction,
        onboardingComplete: !!p.onboardingComplete
      };
    }

    async function checkOnboardingNeeded() {
      if (!currentUser) return false;
      const status = await getOnboardingStatus();
      if (!status || status.onboardingComplete) return false;
      // Check if user has completed enough steps
      const steps = [status.directionSet, status.profileSetup, status.joinedCommunity, status.firstPost, status.firstReaction];
      const done = steps.filter(Boolean).length;
      if (done >= 4) {
        // Mark complete
        await setDoc(doc(db, 'users', currentUser.uid), { onboardingComplete: true }, { merge: true });
        await loadProfile(currentUser.uid);
        celebrate('badge');
        showMessage('Onboarding complete! Welcome to JourneyHub.', 'success');
        return false;
      }
      // Update the onboarding card if it's visible on screen
      const el = document.getElementById('onboardingArea');
      if (el) el.innerHTML = renderOnboardingCard(status);
      return true;
    }

    function renderOnboardingCard(status) {
      if (!status || status.onboardingComplete) return '';
      const steps = [
        { done: status.directionSet, icon: '&#127919;', title: 'Name what you want to grow', desc: 'Set your goal, stage, and where you need support', action: "window.focusGrowthDirection()" },
        { done: status.profileSetup, icon: '&#128100;', title: 'Sharpen your profile', desc: 'Add your focus, interests, and what you are building', action: "window.showEditProfile()" },
        { done: status.joinedCommunity, icon: '&#127968;', title: 'Find a relevant community', desc: 'Join a room that can improve your signal', action: "window.showCommunities()" },
        { done: status.firstPost, icon: '&#9997;', title: 'Share a goal or blocker', desc: 'Start a thread so the right people can help', action: "window.showNewThread()" },
        { done: status.firstReaction, icon: '&#129504;', title: 'Use the discovery layer', desc: 'Open resources or ask the guide for your next move', action: "window.showResources()" }
      ];
      const done = steps.filter(s => s.done).length;
      const pct = Math.round((done / steps.length) * 100);

      return `
        <div class="onboarding-card">
          <h2>Build Your Growth Loop</h2>
          <p style="font-size:13px;color:var(--gray);">Complete these steps to turn JourneyHub into a source of better signal and momentum.</p>
          ${status.directionSet ? '' : `
            <form onsubmit="window.saveGrowthDirection(event); return false;" style="margin-top:14px;">
              <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:10px;margin-bottom:10px;">
                <div class="form-group" style="margin-bottom:0;">
                  <label for="growthGoalQuick">What are you trying to grow?</label>
                  <input id="growthGoalQuick" type="text" placeholder="Launch a product, build confidence, find mentors..." required>
                </div>
                <div class="form-group" style="margin-bottom:0;">
                  <label for="growthStageQuick">What stage are you in?</label>
                  <select id="growthStageQuick">
                    <option value="starting">Starting</option>
                    <option value="building">Building</option>
                    <option value="refining">Refining</option>
                    <option value="scaling">Scaling</option>
                  </select>
                </div>
              </div>
              <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:10px;align-items:end;">
                <div class="form-group" style="margin-bottom:0;">
                  <label for="growthSupportQuick">What would help most right now?</label>
                  <select id="growthSupportQuick">
                    <option value="clarity">Clarity</option>
                    <option value="accountability">Accountability</option>
                    <option value="mentorship">Mentorship</option>
                    <option value="community">Community</option>
                  </select>
                </div>
                <div class="form-group" style="margin-bottom:0;">
                  <label for="growthChallengeQuick">Current blocker</label>
                  <input id="growthChallengeQuick" type="text" placeholder="Staying consistent, prioritizing, finding the right people">
                </div>
                <button type="submit" class="small-btn" style="height:42px;">Save Direction</button>
              </div>
            </form>
          `}
          <div class="progress-text" style="margin-top:10px;">${done}/${steps.length} complete</div>
          <div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>
          <ul class="onboarding-steps">
            ${steps.map(s => `
              <li class="onboarding-step ${s.done ? 'done' : ''}" onclick="${s.action}">
                <span class="step-icon">${s.done ? '&#9745;' : s.icon}</span>
                <div class="step-text">
                  <h4>${s.title}</h4>
                  <p>${s.desc}</p>
                </div>
              </li>
            `).join('')}
          </ul>
        </div>
      `;
    }

    function focusGrowthDirection() {
      const goalEl = document.getElementById('growthGoalQuick');
      if (goalEl) {
        goalEl.focus();
        goalEl.scrollIntoView({ behavior: 'smooth', block: 'center' });
        return;
      }
      showEditProfile();
    }

    async function saveGrowthDirection(event) {
      event.preventDefault();
      if (!currentUser) return;

      const btn = event.target.querySelector('button[type="submit"]');
      if (btn) {
        btn.disabled = true;
        btn.textContent = 'Saving...';
      }

      try {
        const growthGoal = document.getElementById('growthGoalQuick').value.trim();
        const growthStage = document.getElementById('growthStageQuick').value;
        const preferredSupport = document.getElementById('growthSupportQuick').value;
        const growthChallenge = document.getElementById('growthChallengeQuick').value.trim();

        await setDoc(doc(db, 'users', currentUser.uid), {
          growthGoal,
          growthStage,
          preferredSupport,
          growthChallenge,
          currentFocus: currentProfile?.currentFocus || growthGoal,
          onboardingSignalsSet: true,
          updatedAt: serverTimestamp()
        }, { merge: true });

        currentProfile = {
          ...(currentProfile || { id: currentUser.uid }),
          growthGoal,
          growthStage,
          preferredSupport,
          growthChallenge,
          currentFocus: currentProfile?.currentFocus || growthGoal,
          onboardingSignalsSet: true
        };

        await trackJourneyEvent('growth_direction_set', { growthStage, preferredSupport });
        await checkOnboardingNeeded();
        showMessage('Your growth direction is set.', 'success');
        if (currentView === 'home') showHome();
      } catch (error) {
        console.error('Error saving growth direction:', error);
        showMessage('Error saving growth direction', 'error');
        if (btn) {
          btn.disabled = false;
          btn.textContent = 'Save Direction';
        }
      }
    }

    // ──────────────────────────────────────────
    // 7. Empty state helper
    // ──────────────────────────────────────────
    function emptyState(icon, title, desc, btnText, btnAction) {
      return `
        <div class="empty-state">
          <div class="empty-icon">${icon}</div>
          <h3>${escapeHtml(title)}</h3>
          <p>${escapeHtml(desc)}</p>
          ${btnText ? `<button onclick="${btnAction}">${escapeHtml(btnText)}</button>` : ''}
        </div>
      `;
    }


    // ──────────────────────────────────────────
    // Spark Bot
    // ──────────────────────────────────────────
    async function ensureSparkBot() {
      if (!currentUser) return;
      try {
        const fn = httpsCallable(functions, 'ensureSparkBotConversation');
        await fn({});
      } catch (e) {
        console.error('Error ensuring spark bot:', e);
      }
    }

    async function openSparkBot() {
      if (!currentUser) { showLogin(); return; }
      try {
        const fn = httpsCallable(functions, 'ensureSparkBotConversation');
        const result = await fn({});
        const convId = result.data.convId;
        await showMessages();
        // Wait for messages view to render then open the conversation
        pendingConvOpen = convId;
      } catch (e) {
        console.error('Error opening spark bot:', e);
        showMessage('Error opening Spark Bot', 'error');
      }
    }

    // Nav dropdowns
    function toggleNavDropdown(id) {
      const el = document.getElementById(id);
      if (!el) return;
      const wasOpen = el.classList.contains('open');
      closeNavDropdowns();
      if (!wasOpen) el.classList.add('open');
    }

    function closeNavDropdowns() {
      document.querySelectorAll('.nav-dropdown').forEach(d => d.classList.remove('open'));
    }

    // Close dropdowns when clicking outside
    document.addEventListener('click', (e) => {
      if (!e.target.closest('.nav-dropdown')) {
        closeNavDropdowns();
      }
    });

    window.toggleNavDropdown = toggleNavDropdown;
    window.closeNavDropdowns = closeNavDropdowns;

    // Theme toggle
    function toggleTheme() {
      const html = document.documentElement;
      const current = html.getAttribute('data-theme');
      const next = current === 'light' ? 'dark' : 'light';
      html.setAttribute('data-theme', next);
      localStorage.setItem('journeyhub-theme', next);
      updateNav(); // Re-render to update the toggle icon
    }

    // Apply saved theme on load
    (function() {
      const saved = localStorage.getItem('journeyhub-theme');
      if (saved === 'light') {
        document.documentElement.setAttribute('data-theme', 'light');
      }
    })();

    window.toggleTheme = toggleTheme;

    // Initialize
    init();
  </script>
</body>
</html>
